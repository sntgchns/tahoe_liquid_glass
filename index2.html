<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Tahoe - Liquid Glass Effect</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.4);
        }

        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #050505;
            /* Fondo oscuro para resaltar las luces */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Luces ambientales que se mueven detrás del vidrio */
        .ambient-light {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(100, 150, 255, 0.6) 0%, rgba(150, 50, 255, 0) 70%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .ambient-light.two {
            background: radial-gradient(circle, rgba(255, 100, 200, 0.5) 0%, rgba(255, 50, 50, 0) 70%);
            width: 600px;
            height: 600px;
            top: 10%;
            left: 20%;
        }

        /* Contenedor del Vidrio */
        .liquid-container {
            position: relative;
            width: 800px;
            height: 500px;
            z-index: 10;
            perspective: 1500px;
        }

        .glass-window {
            width: 100%;
            height: 100%;
            background: var(--glass-bg);
            border-radius: 32px;
            border: 1px solid var(--border-color);

            /* El secreto del Liquid Glass: */
            backdrop-filter: blur(60px) saturate(200%) contrast(110%);
            -webkit-backdrop-filter: blur(60px) saturate(200%) contrast(110%);

            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.1);

            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* Brillo de superficie (Glint) */
        .glass-window::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 40%, rgba(255, 255, 255, 0.05) 50%, transparent 100%);
            pointer-events: none;
        }

        .header {
            height: 60px;
            padding: 0 25px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            opacity: 0.8;
        }

        .r {
            background: #ff5f57;
        }

        .y {
            background: #febc2e;
        }

        .g {
            background: #28c840;
        }

        .content {
            padding: 50px;
            color: white;
            flex-grow: 1;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            letter-spacing: -1px;
            font-weight: 700;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.7;
            max-width: 400px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <div class="ambient-light" id="light1"></div>
    <div class="ambient-light two" id="light2"></div>

    <div class="liquid-container">
        <div class="glass-window" id="glass">
            <div class="header">
                <div class="dots">
                    <div class="dot r"></div>
                    <div class="dot y"></div>
                    <div class="dot g"></div>
                </div>
            </div>
            <div class="content">
                <h1>Tahoe</h1>
                <p>La interfaz líquida reacciona a la luz ambiental. Mueve el cursor para ver la refracción en los
                    bordes.</p>
            </div>
        </div>
    </div>

    <script>
        const glass = document.getElementById('glass');
        const light1 = document.getElementById('light1');
        const light2 = document.getElementById('light2');

        document.addEventListener('mousemove', (e) => {
            const { clientX, clientY } = e;

            // Movimiento de las luces (Efecto detrás del vidrio)
            const moveX = (clientX - window.innerWidth / 2) * 0.5;
            const moveY = (clientY - window.innerHeight / 2) * 0.5;

            light1.style.transform = `translate(${moveX}px, ${moveY}px)`;
            light2.style.transform = `translate(${-moveX * 0.8}px, ${-moveY * 1.2}px)`;

            // Inclinación 3D de la ventana
            const rotateY = (clientX / window.innerWidth - 0.5) * 15;
            const rotateX = (clientY / window.innerHeight - 0.5) * -15;

            glass.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });
    </script>
</body>

</html>
